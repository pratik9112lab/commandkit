apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: commandkit
  labels:
    app: commandkit-redis
    app.kubernetes.io/name: commandkit
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commandkit-redis
  namespace: commandkit
  labels:
    app: commandkit-redis
    app.kubernetes.io/name: commandkit
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commandkit-redis
  template:
    metadata:
      labels:
        app: commandkit-redis
        app.kubernetes.io/name: commandkit
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --appendonly yes
            - --maxmemory 256mb
            - --maxmemory-policy allkeys-lru
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: commandkit-redis
  namespace: commandkit
  labels:
    app: commandkit-redis
    app.kubernetes.io/name: commandkit
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app: commandkit-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
