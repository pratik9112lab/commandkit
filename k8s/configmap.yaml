apiVersion: v1
kind: ConfigMap
metadata:
  name: commandkit-config
  namespace: commandkit
  labels:
    app: commandkit-app
    app.kubernetes.io/name: commandkit
data:
  NEXT_PUBLIC_SUPABASE_URL: "https://your-supabase-instance.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "your-supabase-anon-key"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: commandkit-secrets
  namespace: commandkit
  labels:
    app: commandkit-app
    app.kubernetes.io/name: commandkit
type: Opaque
stringData:
  SUPABASE_SERVICE_ROLE_KEY: "your-supabase-service-role-key"
  REDIS_URL: "redis://commandkit-redis:6379"
