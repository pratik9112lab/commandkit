apiVersion: v1
kind: Service
metadata:
  name: commandkit-app
  namespace: commandkit
  labels:
    app: commandkit-app
    app.kubernetes.io/name: commandkit
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: commandkit-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
